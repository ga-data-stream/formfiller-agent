# The single company data profile. Same data for every form.
# `aliases` help match differently-worded questions and reduce LLM cost.
fields:
  - name: company_legal_name
    value: "Ginesis Finance SAS"
    aliases: ["company name", "legal name", "raison sociale", "société"]
  - name: vat_number
    value: "FR0120000000"
    aliases: ["VAT", "VAT number", "N° TVA", "numéro de TVA", "tax id"]
  - name: siret
    value: "98765432155555"
    aliases: ["SIRET", "company registration number"]
  - name: contact_email
    value: "contact@ginesis-finance.com"
    aliases: ["email", "e-mail", "contact email", "adresse email"]
  - name: contact_phone
    value: "+33000000000"
    aliases: ["phone", "telephone", "téléphone", "phone number"]
  - name: address_street
    value: "1 place Vendôme"
    aliases: ["street", "rue", "numéro et rue"]
  - name: address_city
    value: "Paris"
    aliases: ["city", "ville"]
  - name: address_postal_code
    value: "75001"
    aliases: ["postal code", "zip", "code postal"]
  - name: address_country
    value: "France"
    aliases: ["country", "pays"]
  - name: billing_address
    # Full one-line address for forms asking for the whole address in one field.
    value: "1 place Vendôme, 75001 Paris, France"
    aliases: ["adresse de facturation", "billing address", "adresse complète",
              "adresse postale", "full address", "adresse"]
  - name: iban
    value: "FR7600000000000000000000000"
    aliases: ["IBAN", "bank account"]
  # --- Fields the Adisséo e-invoicing form needs. REPLACE the placeholder
  #     values below with your real company answers before enabling submission. ---
  - name: siren
    value: "987654321"   # TODO: your real 9-digit SIREN (distinct from the 14-digit SIRET above)
    aliases: ["SIREN", "numéro SIREN", "SIREN (9 caractères)"]
  - name: accounting_contact
    value: "Jane Doe"   # TODO: name of your contact in the accounting team
    aliases: ["contact comptable", "contact dans vos équipes comptables", "accounting contact", "interlocuteur comptable", "en charge de la comptabilité"]
  - name: addressing_format
    # TODO: the e-invoicing addressing format you use. The LLM maps this to the form's
    # specific options (e.g. SIREN / SIREN_SIRET / SIREN_SIRET_Code_Routage / SIREN_Suffixe).
    value: "SIREN + SIRET"
    aliases: ["format d'adressage", "choix de format d'adressage", "addressing format"]
  - name: addressing_line
    value: "23 456 789 00012-PARIS"   # TODO: the addressing line to receive invoices
    aliases: ["ligne d'adressage", "adressage", "addressing line"]
  - name: einvoicing_readiness
    value: "en cours"
    aliases: ["niveau de préparation à la facturation électronique", "préparation facturation électronique", "e-invoicing readiness", "niveau de préparation"]
